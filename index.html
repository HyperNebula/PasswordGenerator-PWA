<!DOCTYPE html>
<html lang="en">

    <head>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Simple Password Generator</title>
        <link rel="icon" href="favicon.png" type="image/png">
        <link rel="manifest" href="manifest.json">

        <link rel="stylesheet" href="style.css">
    
    </head>

    <body>
        <h1>A Password Generator</h1>
        <h2>Generate a 24 character password with upper/lower case letters, numbers, and symbols</h2>

        <div class="display-container">
            <input type="text" id="password-display" readonly placeholder="Password will appear here">
            <button id="copy-btn" onclick="handleCopy()">Copy</button>
        </div>

        <button id="generate-btn" onclick="generatePassword()">Generate Password</button>

        <footer>

            <span>David Deskins | </span>
            <a href="https://github.com/HyperNebula/PasswordGenerator-PWA" target="_blank" rel="noopener noreferrer" style="text-decoration: none;">Github Repository</a>

        </footer>
        
        <script src="script.js"></script>

        <script type="text/javascript">

            if ("serviceWorker" in navigator) {
                navigator.serviceWorker.register("/service-worker.js")
                .then(() => console.log("Service worker registered"))
                .catch((error) => console.log("Service worker failed", error));
            }

        </script>
    </body>
</html>
